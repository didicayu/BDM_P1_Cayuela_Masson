services:
  minio:
    image: minio/minio:latest
    container_name: cybersecintel-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - ./data/minio:/data
    restart: unless-stopped

  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.1
    container_name: cybersecintel-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    restart: unless-stopped

  kafka:
    image: confluentinc/cp-kafka:7.6.1
    container_name: cybersecintel-kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:29092,PLAINTEXT_HOST://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
    restart: unless-stopped

  postgres:
    image: postgres:16
    container_name: cybersecintel-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-airflow}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-airflow}
      POSTGRES_DB: ${POSTGRES_DB:-airflow}
    ports:
      - "${POSTGRES_PORT:-5433}:5432"
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
    restart: unless-stopped

  airflow-init:
    image: apache/airflow:2.10.4
    container_name: cybersecintel-airflow-init
    depends_on:
      - postgres
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${POSTGRES_USER:-airflow}:${POSTGRES_PASSWORD:-airflow}@postgres:5432/${POSTGRES_DB:-airflow}
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW_UID: ${AIRFLOW_UID:-50000}
      PYTHONPATH: /opt/project
      NVD_API_KEY: ${NVD_API_KEY:-}
      ABUSE_CH_API_KEY: ${ABUSE_CH_API_KEY:-}
      SHODAN_API_KEY: ${SHODAN_API_KEY:-}
      EPSS_RESULTS_PER_PAGE: ${EPSS_RESULTS_PER_PAGE:-1000}
      EPSS_MAX_PAGES: ${EPSS_MAX_PAGES:-10}
      CIRCL_TOP_N_CVES: ${CIRCL_TOP_N_CVES:-200}
      THREATFOX_DAYS: ${THREATFOX_DAYS:-1}
      SHODAN_MAX_INDICATORS_PER_RUN: ${SHODAN_MAX_INDICATORS_PER_RUN:-50}
      SHODAN_REQUEST_SLEEP_SECONDS: ${SHODAN_REQUEST_SLEEP_SECONDS:-1.0}
      SHODAN_SEED_IPS: ${SHODAN_SEED_IPS:-}
      LANDING_BACKEND: ${LANDING_BACKEND:-minio}
      DATASET_IMPORT_MODE: ${DATASET_IMPORT_MODE:-move}
      MINIO_ENDPOINT_URL: ${MINIO_ENDPOINT_URL:-http://minio:9000}
      MINIO_BUCKET: ${MINIO_BUCKET:-landing}
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-minioadmin}
      MINIO_SECURE: ${MINIO_SECURE:-false}
      MINIO_KEY_PREFIX: ${MINIO_KEY_PREFIX:-}
      _AIRFLOW_WWW_USER_USERNAME: ${AIRFLOW_WWW_USER_USERNAME:-admin}
      _AIRFLOW_WWW_USER_PASSWORD: ${AIRFLOW_WWW_USER_PASSWORD:-admin}
    user: "${AIRFLOW_UID:-50000}:0"
    volumes:
      - ./orchestration/airflow/dags:/opt/airflow/dags
      - ./orchestration/airflow/logs:/opt/airflow/logs
      - ./orchestration/airflow/plugins:/opt/airflow/plugins
      - ./:/opt/project
    command: >
      bash -c "
      airflow db migrate &&
      airflow users create --role Admin --username ${AIRFLOW_WWW_USER_USERNAME:-admin} --password ${AIRFLOW_WWW_USER_PASSWORD:-admin} --firstname Admin --lastname User --email admin@example.com || true
      "

  airflow-webserver:
    image: apache/airflow:2.10.4
    container_name: cybersecintel-airflow-webserver
    depends_on:
      - postgres
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${POSTGRES_USER:-airflow}:${POSTGRES_PASSWORD:-airflow}@postgres:5432/${POSTGRES_DB:-airflow}
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW_UID: ${AIRFLOW_UID:-50000}
      PYTHONPATH: /opt/project
      NVD_API_KEY: ${NVD_API_KEY:-}
      ABUSE_CH_API_KEY: ${ABUSE_CH_API_KEY:-}
      SHODAN_API_KEY: ${SHODAN_API_KEY:-}
      EPSS_RESULTS_PER_PAGE: ${EPSS_RESULTS_PER_PAGE:-1000}
      EPSS_MAX_PAGES: ${EPSS_MAX_PAGES:-10}
      CIRCL_TOP_N_CVES: ${CIRCL_TOP_N_CVES:-200}
      THREATFOX_DAYS: ${THREATFOX_DAYS:-1}
      SHODAN_MAX_INDICATORS_PER_RUN: ${SHODAN_MAX_INDICATORS_PER_RUN:-50}
      SHODAN_REQUEST_SLEEP_SECONDS: ${SHODAN_REQUEST_SLEEP_SECONDS:-1.0}
      SHODAN_SEED_IPS: ${SHODAN_SEED_IPS:-}
      LANDING_BACKEND: ${LANDING_BACKEND:-minio}
      DATASET_IMPORT_MODE: ${DATASET_IMPORT_MODE:-move}
      MINIO_ENDPOINT_URL: ${MINIO_ENDPOINT_URL:-http://minio:9000}
      MINIO_BUCKET: ${MINIO_BUCKET:-landing}
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-minioadmin}
      MINIO_SECURE: ${MINIO_SECURE:-false}
      MINIO_KEY_PREFIX: ${MINIO_KEY_PREFIX:-}
    user: "${AIRFLOW_UID:-50000}:0"
    volumes:
      - ./orchestration/airflow/dags:/opt/airflow/dags
      - ./orchestration/airflow/logs:/opt/airflow/logs
      - ./orchestration/airflow/plugins:/opt/airflow/plugins
      - ./:/opt/project
    ports:
      - "8080:8080"
    command: webserver
    restart: unless-stopped

  airflow-scheduler:
    image: apache/airflow:2.10.4
    container_name: cybersecintel-airflow-scheduler
    depends_on:
      - postgres
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${POSTGRES_USER:-airflow}:${POSTGRES_PASSWORD:-airflow}@postgres:5432/${POSTGRES_DB:-airflow}
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW_UID: ${AIRFLOW_UID:-50000}
      PYTHONPATH: /opt/project
      NVD_API_KEY: ${NVD_API_KEY:-}
      ABUSE_CH_API_KEY: ${ABUSE_CH_API_KEY:-}
      SHODAN_API_KEY: ${SHODAN_API_KEY:-}
      EPSS_RESULTS_PER_PAGE: ${EPSS_RESULTS_PER_PAGE:-1000}
      EPSS_MAX_PAGES: ${EPSS_MAX_PAGES:-10}
      CIRCL_TOP_N_CVES: ${CIRCL_TOP_N_CVES:-200}
      THREATFOX_DAYS: ${THREATFOX_DAYS:-1}
      SHODAN_MAX_INDICATORS_PER_RUN: ${SHODAN_MAX_INDICATORS_PER_RUN:-50}
      SHODAN_REQUEST_SLEEP_SECONDS: ${SHODAN_REQUEST_SLEEP_SECONDS:-1.0}
      SHODAN_SEED_IPS: ${SHODAN_SEED_IPS:-}
      LANDING_BACKEND: ${LANDING_BACKEND:-minio}
      DATASET_IMPORT_MODE: ${DATASET_IMPORT_MODE:-move}
      MINIO_ENDPOINT_URL: ${MINIO_ENDPOINT_URL:-http://minio:9000}
      MINIO_BUCKET: ${MINIO_BUCKET:-landing}
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-minioadmin}
      MINIO_SECURE: ${MINIO_SECURE:-false}
      MINIO_KEY_PREFIX: ${MINIO_KEY_PREFIX:-}
    user: "${AIRFLOW_UID:-50000}:0"
    volumes:
      - ./orchestration/airflow/dags:/opt/airflow/dags
      - ./orchestration/airflow/logs:/opt/airflow/logs
      - ./orchestration/airflow/plugins:/opt/airflow/plugins
      - ./:/opt/project
    command: scheduler
    restart: unless-stopped
